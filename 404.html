<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Amazon + TikTok Dual Platform Strategy</title>
    <meta name="robots" content="noindex, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628, #0f2928);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 500px; }
        h1 { font-size: 72px; font-weight: 900; color: #14b8a6; margin-bottom: 8px; }
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 16px; }
        p { color: #94a3b8; margin-bottom: 32px; line-height: 1.6; }
        a {
            display: inline-block;
            background: linear-gradient(90deg, #14b8a6, #0ea5e9);
            color: #fff;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
        }
        a:hover { transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
